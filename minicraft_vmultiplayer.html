
<!DOCTYPE html>
<html>
<head>
  <title>MiniCraft Multiplayer</title>
  <style>
    body { margin:0; overflow:hidden; background:#222; color:white; }
    #scr {
      position:absolute;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }
    button {
      font-size:20px;
      padding:10px 20px;
      cursor:pointer;
    }
    canvas {
      background:#333;
    }
  </style>
</head>
<body>

<div id="scr">
  <h1>MiniCraft</h1>
  <button id="btn">► Jouer</button>
</div>

<canvas id="game" width="800" height="600"></canvas>

<script>
let socket;
let playerId;
let players = {};
let myPos = { x: 100, y: 100 };

// 🎮 bouton jouer
const btn = document.getElementById("btn");
const screen = document.getElementById("scr");

btn.addEventListener("click", () => {

  screen.style.display = "none";

  let roomCode = prompt("Code de la room :") || "default";

  socket = new WebSocket("ws://" + location.host);

  socket.onopen = () => {
    socket.send(JSON.stringify({
      type: "join",
      room: roomCode
    }));
  };

  socket.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if (data.type === "init") {
      playerId = data.id;
      players = data.players;
    }

    if (data.type === "update") {
      players = data.players;
    }
  };

});

// 🎨 canvas
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🎮 contrôles
document.addEventListener("keydown", (e) => {
  if (!socket) return;

  if (e.key === "z") myPos.y -= 5;
  if (e.key === "s") myPos.y += 5;
  if (e.key === "q") myPos.x -= 5;
  if (e.key === "d") myPos.x += 5;

  socket.send(JSON.stringify({
    type: "move",
    position: myPos
  }));
});

// 🔁 boucle de jeu
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let id in players) {
    let p = players[id];

    ctx.fillStyle = (id === playerId) ? "lime" : "red";
    ctx.fillRect(p.x, p.y, 20, 20);
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
